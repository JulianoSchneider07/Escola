<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja para Trabalho de Programação</title>
    <style>
        :root {
            --pastel-pink: #fce4ec;
            --pastel-blue: #e3f2fd;
            --pastel-green: #e8f5e9;
            --pastel-yellow: #fff9c4;
            --text-color: #5d4037;
            --accent-color: #f06292;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: #fffafb; color: var(--text-color); }

        header {
            background-color: var(--pastel-pink);
            padding: 2rem;
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
        }

        nav {
            background: white;
            padding: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-admin { background: var(--pastel-blue); border: none; padding: 5px 15px; cursor: pointer; border-radius: 5px; }

        /* Estilo do Carrossel */
        .carousel-container {
            width: 100%;
            overflow: hidden;
            position: relative;
            padding: 20px 0;
            background: var(--pastel-yellow);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
            gap: 20px;
            padding: 0 50px;
        }

        .carousel-item {
            min-width: 300px;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 15px;
            display: flex;
            align-items: flex-end;
            cursor: pointer;
        }

        .carousel-item span {
            background: rgba(255,255,255,0.8);
            width: 100%;
            padding: 5px;
            text-align: center;
            border-radius: 0 0 15px 15px;
        }

        /* Lista de Produtos */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 40px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }

        .product-card:hover { transform: translateY(-5px); }

        .product-card img { width: 100%; height: 180px; border-radius: 10px; object-fit: cover; }

        .btn-buy {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Modal / Popup */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }

        /* Carrinho */
        #cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            transition: 0.3s;
            z-index: 1001;
            padding: 20px;
        }

        #cart-sidebar.active { right: 0; }

        /* Área Admin */
        #admin-panel { display: none; padding: 40px; background: #eee; min-height: 100vh; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <h1>Loja para Trabalho de Programação</h1>
    <p>Doces momentos em tons pastéis</p>
</header>

<nav>
    <a href="#" onclick="showPage('home')">Início</a>
    <a href="#" onclick="toggleCart()">Carrinho (<span id="cart-count">0</span>)</a>
    <button class="btn-admin" onclick="showLogin()">Admin</button>
</nav>

<div id="home-page">
    <div class="carousel-container">
        <div class="carousel-track" id="carousel">
            </div>
    </div>

    <h2 style="text-align:center; margin-top:30px;">Nossos Bolos</h2>
    <div class="product-grid" id="product-list">
        </div>
</div>

<div id="product-modal" class="modal">
    <div class="modal-content" id="modal-body">
        </div>
</div>

<div id="login-modal" class="modal">
    <div class="modal-content">
        <h3>Acesso Restrito</h3><br>
        <input type="text" id="adm-user" placeholder="Usuário"><br><br>
        <input type="password" id="adm-pass" placeholder="Senha"><br><br>
        <button onclick="login()">Entrar</button>
        <button onclick="closeModals()">Fechar</button>
    </div>
</div>

<div id="admin-panel">
    <h2>Painel de Pedidos Recebidos</h2>
    <button onclick="showPage('home')">Sair do Admin</button>
    <hr style="margin: 20px 0;">
    <div id="orders-list">
        <p>Nenhum pedido recebido ainda.</p>
    </div>
</div>

<div id="cart-sidebar">
    <h3>Seu Carrinho</h3>
    <hr><br>
    <div id="cart-items"></div>
    <br>
    <div id="cart-total">Total: R$ 0,00</div><br>
    <button class="btn-buy" style="width:100%" onclick="checkout()">Finalizar Pedido e Enviar ao Admin</button>
    <br><br>
    <button onclick="toggleCart()">Fechar</button>
</div>

<script>
    const products = [
        { id: 1, name: "Bolo de Morango", price: 85.00, desc: "Bolo fofinho com recheio de creme belga e morangos frescos.", img: "https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=500" },
        { id: 2, name: "Bolo de Chocolate", price: 70.00, desc: "Massa de cacau 70% com cobertura de brigadeiro gourmet.", img: "https://images.unsplash.com/photo-1578985543062-d97adad20844?w=500" },
        { id: 3, name: "Bolo de Limão", price: 60.00, desc: "Refrescante com raspas de limão siciliano e mousse leve.", img: "https://images.unsplash.com/photo-1519340333755-56e9c1d04579?w=500" },
        { id: 4, name: "Red Velvet", price: 95.00, desc: "O clássico americano com recheio de cream cheese frosting.", img: "https://images.unsplash.com/photo-1586788680434-30d324671ff6?w=500" }
    ];

    let cart = [];
    let orders = [];

    // Inicialização
    function init() {
        const carousel = document.getElementById('carousel');
        const list = document.getElementById('product-list');

        products.forEach(p => {
            // Carrossel
            carousel.innerHTML += `
                <div class="carousel-item" style="background-image: url('${p.img}')" onclick="openProduct(${p.id})">
                    <span>${p.name}</span>
                </div>
            `;
            // Lista
            list.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p>R$ ${p.price.toFixed(2)}</p>
                    <button class="btn-buy" onclick="openProduct(${p.id})">Ver Detalhes</button>
                </div>
            `;
        });
    }

    // Modal de Produto
    function openProduct(id) {
        const p = products.find(prod => prod.id === id);
        const modal = document.getElementById('product-modal');
        document.getElementById('modal-body').innerHTML = `
            <h2>${p.name}</h2><br>
            <img src="${p.img}" style="width:100%; border-radius:10px;"><br><br>
            <p>${p.desc}</p><br>
            <p><strong>Preço: R$ ${p.price.toFixed(2)}</strong></p><br>
            <button class="btn-buy" onclick="addToCart(${p.id})">Adicionar ao Carrinho</button>
            <button onclick="closeModals()">Voltar</button>
        `;
        modal.style.display = 'flex';
    }

    // Lógica do Carrinho
    function addToCart(id) {
        const p = products.find(prod => prod.id === id);
        cart.push(p);
        updateCart();
        closeModals();
        toggleCart();
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        const container = document.getElementById('cart-items');
        let total = 0;
        container.innerHTML = "";
        cart.forEach((item, index) => {
            total += item.price;
            container.innerHTML += `<p>${item.name} - R$ ${item.price.toFixed(2)} <button onclick="removeItem(${index})">❌</button></p>`;
        });
        document.getElementById('cart-total').innerText = `Total: R$ ${total.toFixed(2)}`;
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateCart();
    }

    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('active');
    }

    function checkout() {
        if(cart.length === 0) return alert("Carrinho vazio!");
        const order = {
            id: Date.now(),
            items: [...cart],
            total: cart.reduce((a, b) => a + b.price, 0)
        };
        orders.push(order);
        cart = [];
        updateCart();
        toggleCart();
        alert("Pedido enviado com sucesso para o Administrador!");
        updateAdminPanel();
    }

    // Área Administrativa
    function showLogin() {
        document.getElementById('login-modal').style.display = 'flex';
    }

    function login() {
        const u = document.getElementById('adm-user').value;
        const p = document.getElementById('adm-pass').value;
        if(u === 'admin' && p === 'admin') {
            closeModals();
            showPage('admin');
        } else {
            alert("Login ou senha inválidos!");
        }
    }

    function updateAdminPanel() {
        const list = document.getElementById('orders-list');
        if(orders.length === 0) {
            list.innerHTML = "<p>Nenhum pedido recebido ainda.</p>";
            return;
        }
        list.innerHTML = orders.map(o => `
            <div style="background:white; padding:15px; margin-bottom:10px; border-radius:10px;">
                <strong>Pedido #${o.id}</strong><br>
                Itens: ${o.items.map(i => i.name).join(', ')}<br>
                Total: R$ ${o.total.toFixed(2)}
            </div>
        `).join('');
    }

    function showPage(page) {
        if(page === 'home') {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('admin-panel').style.display = 'none';
        } else {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('admin-panel').style.display = 'block';
        }
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    init();
</script>

</body>
</html>
