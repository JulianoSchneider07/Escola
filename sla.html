<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sla titulo, só pro trabalho</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-pink: #fce4ec;
            --pastel-blue: #e3f2fd;
            --pastel-green: #e8f5e9;
            --pastel-yellow: #fff9c4;
            --deep-pink: #f06292;
            --text-main: #4a4a4a;
            --white-glass: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { 
            background-color: #ee4bd8be;
            color: var(--text-main);
            line-height: 1.6;
        }

    
        header {
            background-color: rgba(212, 131, 192, 0.342);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--pastel-pink);
        }

        header h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--deep-pink);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        nav {
            background: rgb(206, 120, 173);
            backdrop-filter: blur(10px);
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            gap: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            transition: 0.3s;
        }

        nav a:hover { color: var(--deep-pink); }

        .btn-admin-nav {
            background: var(--pastel-blue);
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .carousel-container {
            padding: 40px 0;
            background: rgba(255, 255, 255, 0.4);
            overflow-x: auto;
            display: flex;
            gap: 20px;
            padding-left: 50px;
            scrollbar-width: none;
        }

        .carousel-item {
            min-width: 350px;
            height: 250px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.4s;
            cursor: pointer;
        }

        .carousel-item:hover { transform: scale(1.02); }

        .carousel-item span {
            background: rgba(199, 75, 106, 0.76);
            width: 100%;
            padding: 15px;
            text-align: center;
            font-weight: 600;
            border-radius: 0 0 20px 20px;
        }

        /* Lista de Produtos */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #f0f0f0;
        }

        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(240, 98, 146, 0.15); }

        .product-card img { width: 100%; height: 220px; object-fit: cover; }

        .card-info { padding: 20px; text-align: center; }

        .price { color: var(--deep-pink); font-size: 1.4rem; font-weight: 600; margin: 10px 0; }

        .btn-buy {
            background: var(--deep-pink);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            width: 100%;
        }

        .btn-buy:hover { background: #d81b60; letter-spacing: 1px; }

                                    
        #cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 380px;
            height: 100%;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
            padding: 30px;
        }

        #cart-sidebar.active { right: 0; }

        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.4s ease;
        }

      

        
        #admin-panel { display: none; padding: 50px; max-width: 1000px; margin: 0 auto; }
        .order-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--deep-pink); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <h1>Loja para Trabalho de Programação</h1>
    <p>Tecnologia e Doçura em cada pedaçu do bolu  </p>
</header>

<nav>
    <a href="#" onclick="showPage('home')">Catálogo</a>
    <a href="#" onclick="toggleCart()">🛒 Carrinho (<span id="cart-count">0</span>)</a>
    <button class="btn-admin-nav" onclick="showLogin()">🔐 Admin</button>
</nav>

<div id="home-page">
    <div class="carousel-container" id="carousel">
        </div>

    <div class="container">
        <h2 style="margin-bottom: 30px; text-align: center;">Destaques da Semana</h2>
        <div class="product-grid" id="product-list">
            </div>
    </div>
</div>

<div id="product-modal" class="modal">
    <div class="modal-content" id="modal-body"></div>
</div>

<div id="login-modal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: 'Dancing Script';">Acesso Administrativo</h2><br>
        <input type="text" id="adm-user" placeholder="Usuário" style="padding:10px; border-radius:10px; border:1px solid #ddd; width: 80%;"><br><br>
        <input type="password" id="adm-pass" placeholder="Senha" style="padding:10px; border-radius:10px; border:1px solid #ddd; width: 80%;"><br><br>
        <button class="btn-buy" style="width: auto; padding: 10px 40px;" onclick="login()">Entrar</button>
        <p onclick="closeModals()" style="cursor:pointer; margin-top:15px; color:#888;">Cancelar</p>
    </div>
</div>

<div id="admin-panel">
    <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem;">Gestão de Pedidos</h2>
    <button onclick="showPage('home')" style="border:none; background:none; color:var(--deep-pink); cursor:pointer; font-weight:600;">← Voltar para a Loja</button>
    <div id="orders-list" style="margin-top: 30px;">
        </div>
</div>

<div id="cart-sidebar">
    <h2 style="font-family: 'Dancing Script';">Seu Carrinho</h2><br>
    <div id="cart-items" style="max-height: 60vh; overflow-y: auto;"></div>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    <h3 id="cart-total">Total: R$ 0,00</h3><br>
    <button class="btn-buy" onclick="checkout()">Finalizar Compra</button>
    <button onclick="toggleCart()" style="width:100%; background:none; border:none; margin-top:10px; cursor:pointer;">Continuar Comprando</button>
</div>

<script>
    const products = [
        { id: 1, name: "bolinhu de flutas", price: 85.00, desc: "Massa aveludada com frutas silvestres e creme suave.", img: "https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=600" },
        { id: 2, name: "Outo bolinhu", price: 70.00, desc: "O rústico que amamos com ganache de chocolate belga.", img: "https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=600" },
        { id: 3, name: "bulinho tropical Lemon", price: 65.00, desc: "Mousse de limão siciliano com base amanteigada.", img: "https://images.unsplash.com/photo-1519340333755-56e9c1d04579?w=600" },
        { id: 4, name: "Berry Delight", price: 95.00, desc: "Massa branca fofinha coberta com as melhores berries.", img: "https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=600" },
        { id: 5, name: "polinhu com caramelo salgado", price: 75.00, desc: "Combinação perfeita de doce com um toque de sal marinho.", img: "https://images.unsplash.com/photo-1535141192574-5d4897c12636?w=600" }
    ];

    let cart = [];
    let orders = [];

    function init() {
        const carousel = document.getElementById('carousel');
        const list = document.getElementById('product-list');

        products.forEach(p => {
            carousel.innerHTML += `
                <div class="carousel-item" style="background-image: url('${p.img}')" onclick="openProduct(${p.id})">
                    <span>${p.name}</span>
                </div>
            `;
            list.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}">
                    <div class="card-info">
                        <h3>${p.name}</h3>
                        <p class="price">R$ ${p.price.toFixed(2)}</p>
                        <button class="btn-buy" onclick="openProduct(${p.id})">Ver Detalhes</button>
                    </div>
                </div>
            `;
        });
    }

    function openProduct(id) {
        const p = products.find(prod => prod.id === id);
        const modal = document.getElementById('product-modal');
        document.getElementById('modal-body').innerHTML = `
            <img src="${p.img}" style="width:100%; height:250px; object-fit:cover; border-radius:20px;">
            <h2 style="margin-top:20px;">${p.name}</h2>
            <p style="color:#777; margin:15px 0;">${p.desc}</p>
            <p class="price" style="font-size:2rem;">R$ ${p.price.toFixed(2)}</p>
            <button class="btn-buy" onclick="addToCart(${p.id})">Adicionar ao Carrinho</button>
            <p onclick="closeModals()" style="cursor:pointer; margin-top:15px; color:#888;">Fechar</p>
        `;
        modal.style.display = 'flex';
    }

    function addToCart(id) {
        const p = products.find(prod => prod.id === id);
        cart.push(p);
        updateCart();
        closeModals();
        if(!document.getElementById('cart-sidebar').classList.contains('active')) toggleCart();
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        const container = document.getElementById('cart-items');
        let total = 0;
        container.innerHTML = cart.length ? "" : "<p>Seu carrinho está vazio.</p>";
        cart.forEach((item, index) => {
            total += item.price;
            container.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span>${item.name}</span>
                    <span>R$ ${item.price.toFixed(2)} <button onclick="removeItem(${index})" style="border:none; background:none; cursor:pointer;">🗑️</button></span>
                </div>`;
        });
        document.getElementById('cart-total').innerText = `Total: R$ ${total.toFixed(2)}`;
    }

    function removeItem(index) { cart.splice(index, 1); updateCart(); }
    function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

    function checkout() {
        if(cart.length === 0) return alert("Adicione bolos ao carrinho primeiro!");
        const newOrder = {
            id: Math.floor(Math.random() * 9000) + 1000,
            items: [...cart],
            total: cart.reduce((a, b) => a + b.price, 0),
            date: new Date().toLocaleTimeString()
        };
        orders.push(newOrder);
        cart = [];
        updateCart();
        toggleCart();
        alert("Pedido enviado para a cozinha! (Admin)");
        updateAdminPanel();
    }

    function showLogin() { document.getElementById('login-modal').style.display = 'flex'; }

    function login() {
        if(document.getElementById('adm-user').value === 'admin' && document.getElementById('adm-pass').value === 'admin') {
            closeModals();
            showPage('admin');
        } else { alert("Senha incorreta!"); }
    }

    function updateAdminPanel() {
        const list = document.getElementById('orders-list');
        list.innerHTML = orders.length ? "" : "<p>Aguardando novos pedidos...</p>";
        orders.forEach(o => {
            list.innerHTML += `
                <div class="order-card">
                    <strong>Pedido #${o.id} - ${o.date}</strong><br>
                    <small>Itens: ${o.items.map(i => i.name).join(', ')}</small><br>
                    <span style="color:var(--deep-pink); font-weight:600;">Total: R$ ${o.total.toFixed(2)}</span>
                </div>`;
        });
    }

    function showPage(page) {
        if(page === 'home') {
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('admin-panel').style.display = 'none';
        } else {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('admin-panel').style.display = 'block';
        }
    }

    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

    init();
</script>
</body>
</html>
